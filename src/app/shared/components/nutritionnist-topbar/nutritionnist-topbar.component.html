<nav class="navbar navbar-light bg-white shadow-sm px-4 d-flex justify-content-between" style="border-bottom: 3px solid #2ecc71;">
  <div class="d-flex align-items-center">
    <!-- Bouton toggle sidebar -->
    <button class="btn btn-outline-success me-3" (click)="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand mb-0 h5" routerLink="/nutritionnist" style="cursor: pointer;">
      <i class="bi bi-tree-fill text-success me-2"></i>
      Espace Nutritionniste
    </span>
  </div>

  <div class="d-flex align-items-center">
    <!-- Recherche -->
    <div class="input-group me-3" style="width: 250px;">
      <span class="input-group-text bg-success text-white border-0">
        <i class="bi bi-search"></i>
      </span>
      <input type="text" 
             class="form-control border-0 bg-light" 
             placeholder="Rechercher un patient..."
             [(ngModel)]="searchQuery"
             (keyup.enter)="onSearch()">
    </div>

    <!-- Notifications -->
    <div class="dropdown me-3">
      <button class="btn btn-light position-relative" type="button" data-bs-toggle="dropdown">
        <i class="bi bi-bell text-success"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" *ngIf="unreadNotificationsCount > 0">
          {{ unreadNotificationsCount > 9 ? '9+' : unreadNotificationsCount }}
        </span>
      </button>
      <div class="dropdown-menu dropdown-menu-end shadow-sm" style="width: 320px;">
        <div class="dropdown-header bg-light">
          <strong>Notifications</strong>
        </div>
        <div class="dropdown-item text-muted small">
          <i class="bi bi-chat-dots text-success me-2"></i>
          Nouveau message d'un patient
        </div>
        <div class="dropdown-item text-muted small">
          <i class="bi bi-calendar-check text-success me-2"></i>
          Rendez-vous confirmé
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item text-center text-success" routerLink="/nutritionnist/notifications">
          Voir toutes les notifications
        </a>
      </div>
    </div>

    <!-- Profil -->
    <div class="dropdown">
      <button class="btn btn-light d-flex align-items-center" type="button" data-bs-toggle="dropdown">
        <div class="bg-success rounded-circle p-2 me-2 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
          <span class="text-white fw-bold">{{ nutritionistInitials }}</span>
        </div>
        <span class="fw-bold me-2">{{ nutritionistName }}</span>
        <i class="bi bi-chevron-down text-muted"></i>
      </button>
      <div class="dropdown-menu dropdown-menu-end shadow-sm">
        <div class="dropdown-header">
          <strong>{{ nutritionistName }}</strong>
          <small class="d-block text-muted">Nutritionniste</small>
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" (click)="goToProfile()">
          <i class="bi bi-person me-2 text-success"></i> Mon profil
        </a>
        <a class="dropdown-item" (click)="goToSettings()">
          <i class="bi bi-gear me-2 text-success"></i> Paramètres
        </a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item text-danger" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
        </a>
      </div>
    </div>
  </div>
</nav>
