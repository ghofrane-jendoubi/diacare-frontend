<div class="sidebar" [class.collapsed]="isCollapsed">

  <!-- Brand Section simplifiée -->
  <div class="brand-section">
    <div class="logo-container">
      <div class="logo-icon">
        <i class="bi bi-heart-pulse-fill"></i>
      </div>
      <div class="brand-name" *ngIf="!isCollapsed">DiaCare Admin</div>
    </div>
    <button class="collapse-btn" (click)="onToggleSidebar()">
      <i [class.bi-chevron-left]="!isCollapsed" [class.bi-chevron-right]="isCollapsed"></i>
    </button>
  </div>

  <!-- Menu Principal -->
  <div class="menu-section">
    <!-- Dashboard -->
    <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="menu-item">
      <i class="bi bi-speedometer2"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Dashboard</span>
    </a>

    <!-- Utilisateurs -->
    <div class="menu-label" *ngIf="!isCollapsed">UTILISATEURS</div>
    
    <a routerLink="/admin/users/doctors" routerLinkActive="active" class="menu-item">
      <i class="bi bi-person-badge"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Médecins</span>
      <span class="badge-count" *ngIf="doctorsCount > 0">{{ doctorsCount }}</span>
    </a>

    <a routerLink="/admin/users/nutritionists" routerLinkActive="active" class="menu-item">
      <i class="bi bi-apple"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Nutritionnistes</span>
      <span class="badge-count" *ngIf="nutritionistsCount > 0">{{ nutritionistsCount }}</span>
    </a>

    <a routerLink="/admin/users/patients" routerLinkActive="active" class="menu-item">
      <i class="bi bi-people"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Patients</span>
      <span class="badge-count" *ngIf="patientsCount > 0">{{ patientsCount }}</span>
    </a>

    <!-- Support -->
    <div class="menu-label" *ngIf="!isCollapsed">SUPPORT</div>
    
    <a routerLink="/admin/reclamations" routerLinkActive="active" class="menu-item">
      <i class="bi bi-chat-dots"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Réclamations</span>
      <span class="badge-count warning" *ngIf="reclamationsCount > 0">{{ reclamationsCount }}</span>
    </a>

    <a routerLink="/admin/geo" routerLinkActive="active" class="menu-item">
      <i class="bi bi-geo-alt"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Géolocalisation</span>
    </a>

    <!-- Statistiques -->
    <div class="menu-label" *ngIf="!isCollapsed">STATISTIQUES</div>
    
    <a routerLink="/admin/stats" routerLinkActive="active" class="menu-item">
      <i class="bi bi-graph-up"></i>
      <span class="menu-text" *ngIf="!isCollapsed">Analyses</span>
    </a>
  </div>

  <!-- Footer avec déconnexion -->
  <div class="sidebar-footer">
    <a class="footer-item" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span *ngIf="!isCollapsed">Déconnexion</span>
    </a>
  </div>
</div>
