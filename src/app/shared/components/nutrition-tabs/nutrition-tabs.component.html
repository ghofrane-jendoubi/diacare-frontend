<!-- nutrition-tabs.component.html -->
<div class="nutrition-sidebar" *ngIf="isVisible">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <i class="bi bi-apple"></i>
    </div>
    <h4 class="sidebar-title">Nutrition</h4>
  </div>

  <div class="sidebar-nav">
    <!-- Chat avec le nutritionniste sélectionné -->
    <a [routerLink]="['/patient/nutrition-chat', nutritionistId]" 
       routerLinkActive="active" 
       class="nav-item">
      <div class="nav-icon">
        <i class="bi bi-chat-dots"></i>
        <span *ngIf="unreadCount > 0" class="unread-badge">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
      </div>
      <span class="nav-text">Chat nutrition</span>
      <span *ngIf="unreadCount > 0" class="unread-text">{{ unreadCount }}</span>
    </a>

    <!-- Analyse alimentaire (Food Chat) -->
    <a routerLink="/patient/nutrition" 
       routerLinkActive="active" 
       class="nav-item">
      <div class="nav-icon">
        <i class="bi bi-camera"></i>
      </div>
      <span class="nav-text">Analyse alimentaire</span>
    </a>

    <!-- Mes plans alimentaires -->
    <a routerLink="/patient/my-plans" 
       routerLinkActive="active" 
       class="nav-item">
      <div class="nav-icon">
        <i class="bi bi-card-list"></i>
      </div>
      <span class="nav-text">Mes plans</span>
    </a>

    <!-- Mon profil nutritionnel -->
    <a routerLink="/patient/profile" 
       routerLinkActive="active" 
       class="nav-item">
      <div class="nav-icon">
        <i class="bi bi-person"></i>
      </div>
      <span class="nav-text">Mon profil</span>
    </a>

    <!-- Mes progrès -->
    <a routerLink="/patient/progress" 
       routerLinkActive="active" 
       class="nav-item">
      <div class="nav-icon">
        <i class="bi bi-graph-up"></i>
      </div>
      <span class="nav-text">Progrès</span>
    </a>
  </div>

  <div class="sidebar-footer" *ngIf="false">
    <div class="patient-avatar">
      <i class="bi bi-person-fill"></i>
    </div>
  </div>
</div>
