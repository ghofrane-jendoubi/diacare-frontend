<div class="choose-role-page">
  <div class="container py-4">
    <!-- Header original -->
    <div class="text-center mb-4 fade-in">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <div class="logo-wrapper mb-2">
        <div class="heart-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z" fill="white"/>
          </svg>
        </div>
      </div>
      <h2 class="h4 fw-bold mb-1 elegant-title">
        Dia<span class="highlight">Care</span>
      </h2>
      <p class="text-muted small">Choisissez votre expérience</p>
    </div>

    <!-- Grille 2x2 avec cartes originales -->
    <div class="roles-container">
      <div class="row g-4 justify-content-center">
        <div class="col-md-6 col-lg-5 d-flex justify-content-center" *ngFor="let role of roles; let i = index">
          <div 
            class="role-card"
            [class.role-admin]="role.name === 'Admin'"
            [class.role-doctor]="role.name === 'Doctor'"
            [class.role-nutritionist]="role.name === 'Nutritionist'"
            [class.role-patient]="role.name === 'Patient'"
            (click)="selectRole(role.name.toLowerCase())"
            [style.animation-delay]="(i * 0.1) + 's'"
          >
            <!-- Effet de brillance -->
            <div class="glow-effect"></div>
            
            <!-- Contenu -->
            <div class="card-content">
              <!-- Icône avec effet glassmorphisme -->
              <div class="icon-glass">
                <div class="icon-wrapper">
                  <i [class]="role.icon" class="role-icon"></i>
                </div>
              </div>

              <!-- Badge original -->
              <div class="role-badge" *ngIf="role.new">
                <div class="badge-original">
                  <span class="pulse-dot"></span>
                  <span>NEW</span>
                </div>
              </div>

              <!-- Informations -->
              <div class="role-info">
                <h3 class="role-title">{{ role.name }}</h3>
                <p class="role-description">{{ role.description }}</p>
                
                <!-- Ligne décorative -->
                <div class="decorative-line"></div>
                
                <!-- Petit indicateur original -->
                <div class="role-indicator">
                  <div class="indicator-original">
                    <i [class]="role.indicatorIcon"></i>
                    <span>{{ role.indicatorText }}</span>
                  </div>
                </div>

                <!-- Bouton original -->
                <div class="btn-wrapper">
                  <button class="btn-original">
                    <span>Explorer</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                      <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer élégant -->
    <div class="text-center mt-4">
      <div class="footer-decoration">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <p class="text-muted small mt-2">
        <i class="bi bi-shield-check me-1"></i>
        Sécurité & Confidentialité
      </p>
    </div>
  </div>
</div>
