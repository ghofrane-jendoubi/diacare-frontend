<div class="choose-role-page">
  <!-- Background dynamique -->
  <div class="background-role">
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
      <div class="shape shape-5"></div>
    </div>
    <div class="medical-icons-bg">
      <span>🩺</span>
      <span>💊</span>
      <span>❤️</span>
      <span>🥗</span>
      <span>🫀</span>
      <span>🌿</span>
    </div>
    <div class="grid-overlay"></div>
  </div>

  <div class="container py-4">
    <!-- Header avec bouton Admin -->
    <div class="header-section">
      <div class="admin-button-wrapper">
        <button class="btn-admin" (click)="selectRole('admin')">
          <div class="admin-icon">👑</div>
          <span class="admin-text">Admin Access</span>
          <div class="admin-glow"></div>
        </button>
      </div>

      <!-- Logo et titre -->
      <div class="text-center fade-in">
        <div class="floating-shapes-mobile">
          <div class="shape shape-1"></div>
          <div class="shape shape-2"></div>
          <div class="shape shape-3"></div>
        </div>
        <div class="logo-wrapper mb-2">
          <div class="heart-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z" fill="white"/>
            </svg>
          </div>
        </div>
        <h1 class="main-title elegant-title">
          Bienvenue sur <span class="highlight">DiaCare</span>
        </h1>
        <p class="subtitle-text">Choisissez votre espace de travail</p>
      </div>
    </div>

    <!-- Grille 3 cartes -->
    <div class="roles-container">
      <div class="row g-4 justify-content-center">
        <div class="col-md-6 col-lg-4 d-flex justify-content-center" *ngFor="let role of roles; let i = index">
          <div 
            class="role-card"
            [class.role-doctor]="role.name === 'Doctor'"
            [class.role-nutritionist]="role.name === 'Nutritionist'"
            [class.role-patient]="role.name === 'Patient'"
            (click)="selectRole(role.route)"
            [style.animation-delay]="(i * 0.1) + 's'"
          >
            <!-- Effet de brillance -->
            <div class="glow-effect"></div>
            
            <!-- Contenu -->
            <div class="card-content">
              <!-- Icône avec effet glass -->
              <div class="icon-glass">
                <div class="icon-wrapper">
                  <i [class]="role.icon" class="role-icon"></i>
                </div>
              </div>

              <!-- Badge nouveau -->
              <div class="role-badge" *ngIf="role.new">
                <div class="badge-original">
                  <span class="pulse-dot"></span>
                  <span>NOUVEAU</span>
                </div>
              </div>

              <!-- Informations -->
              <div class="role-info">
                <h3 class="role-title">{{ role.name }}</h3>
                <p class="role-description">{{ role.description }}</p>
                
                <!-- Ligne décorative -->
                <div class="decorative-line"></div>
                
                <!-- Indicateur -->
                <div class="role-indicator">
                  <div class="indicator-original">
                    <i [class]="role.indicatorIcon"></i>
                    <span>{{ role.indicatorText }}</span>
                  </div>
                </div>

                <!-- Bouton -->
                <div class="btn-wrapper">
                  <button class="btn-original">
                    <span>Accéder</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                      <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Effet de bordure au survol -->
            <div class="card-border-glow"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer élégant -->
    <div class="footer-section">
      <div class="footer-decoration">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="trust-badges">
        <span class="trust-badge">
          <i class="bi bi-shield-check"></i> Données sécurisées
        </span>
        <span class="trust-badge">
          <i class="bi bi-clock-history"></i> Support 24/7
        </span>
        <span class="trust-badge">
          <i class="bi bi-person-heart"></i> Équipe médicale
        </span>
      </div>
      <p class="copyright">
        © 2024 DiaCare - Votre santé, notre priorité
      </p>
    </div>
  </div>
</div>
