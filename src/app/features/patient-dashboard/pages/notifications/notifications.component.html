<div class="notifications-container">
  <!-- En-tête -->
  <div class="page-header">
    <button class="back-btn" (click)="goBack()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h1>
      <i class="bi bi-bell"></i>
      Mes notifications
    </h1>
    <button class="mark-all-read" *ngIf="hasUnreadNotifications()" (click)="markAllAsRead()">
      <i class="bi bi-check-all"></i> Tout marquer comme lu
    </button>
  </div>

  <!-- Filtres et recherche -->
  <div class="filters-section">
    <div class="filter-tabs">
      <button class="filter-btn" [class.active]="filterType === 'all'" (click)="setFilter('all')">
        Toutes
      </button>
      <button class="filter-btn" [class.active]="filterType === 'unread'" (click)="setFilter('unread')">
        Non lues
      </button>
      <button class="filter-btn" [class.active]="filterType === 'appointments'" (click)="setFilter('appointments')">
        Rendez-vous
      </button>
      <button class="filter-btn" [class.active]="filterType === 'results'" (click)="setFilter('results')">
        Résultats
      </button>
    </div>

    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" 
             placeholder="Rechercher une notification..." 
             [(ngModel)]="searchTerm"
             (input)="applyFilter()">
    </div>
  </div>

  <!-- Liste des notifications -->
  <div class="notifications-list">
    <div *ngIf="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Chargement des notifications...</p>
    </div>

    <div *ngIf="!loading && filteredNotifications.length === 0" class="empty-state">
      <i class="bi bi-bell-slash"></i>
      <h3>Aucune notification</h3>
      <p>Vous n'avez pas encore de notifications</p>
    </div>

    <div *ngFor="let notif of filteredNotifications" 
         class="notification-card"
         [class.unread]="!notif.read"
         (click)="openNotificationDetail(notif)">
      
      <div class="notification-icon" [ngClass]="getBadgeClass(notif.title)">
        <i class="bi" [ngClass]="getIcon(notif.title)"></i>
      </div>

      <div class="notification-content">
        <div class="notification-header">
          <h3>{{ notif.title }}</h3>
          <span class="notification-time">{{ formatDate(notif.createdAt) }}</span>
        </div>
        
        <p class="notification-message">{{ notif.message }}</p>
        
        <div class="notification-footer">
          <span class="notification-status" *ngIf="!notif.read">Non lu</span>
          <span class="notification-status read" *ngIf="notif.read">Lu</span>
          
          <button class="mark-read-btn" *ngIf="!notif.read" (click)="markAsRead(notif, $event)">
            <i class="bi bi-check"></i> Marquer comme lu
          </button>
        </div>
      </div>

      <div class="notification-arrow">
        <i class="bi bi-chevron-right"></i>
      </div>
    </div>
  </div>
</div>

<!-- Modal de détail -->
<app-notification-detail-modal
  *ngIf="showDetailModal"
  [notification]="selectedNotification"
  (closeModal)="closeDetailModal()"
  (payAppointment)="onPay($event)">
</app-notification-detail-modal>
