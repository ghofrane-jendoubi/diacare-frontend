<div class="container mt-4">
  <h2>Gestion des livraisons</h2>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Commande #</th>
          <th>Client</th>
          <th>Statut actuel</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.id }}</td>
          <td>{{ order.clientName }}</td>
          <td>
          <span class="badge" [class]="getBadgeClass(order.deliveryStatus)">
  {{ order.deliveryStatus }}
</span>
          </td>
          <td>
            <select class="form-select form-select-sm" (change)="updateStatus(order.id, $event)">
              <option *ngFor="let s of statuses" [value]="s" [selected]="s === order.deliveryStatus">
                {{ s }}
              </option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
