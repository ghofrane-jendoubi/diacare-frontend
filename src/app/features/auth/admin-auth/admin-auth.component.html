<div class="auth-wrapper">
  <div class="container">
    <div class="form-container">

      <div *ngIf="!isSignUp" class="form-panel">
        <h2>Sign In</h2>
        <p class="subtitle">or use your email password</p>

        <form (ngSubmit)="signIn()" #loginForm="ngForm">
          <div class="input-group">
            <input type="email" [(ngModel)]="loginData.email" name="email" placeholder="Email" required email>
          </div>
          <div class="input-group">
            <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="Password" required>
          </div>
          <button type="submit" class="btn-signin">SIGN IN</button>
        </form>
      </div>

      <div *ngIf="isSignUp" class="form-panel">
        <h2>Create Account</h2>
        <p class="subtitle">Fill your details to register</p>

        <form (ngSubmit)="signUp()" #signupForm="ngForm">
          <div class="input-row">
            <div class="input-group half">
              <input type="text" [(ngModel)]="newUser.firstName" name="firstName" placeholder="First Name" required>
            </div>
            <div class="input-group half">
              <input type="text" [(ngModel)]="newUser.lastName" name="lastName" placeholder="Last Name" required>
            </div>
          </div>
          <div class="input-group">
            <input type="email" [(ngModel)]="newUser.email" name="email" placeholder="Email" required email>
          </div>
          <div class="input-group">
            <input type="tel" [(ngModel)]="newUser.phone" name="phone" placeholder="Phone" required>
          </div>
          <div class="input-group">
            <input type="password" [(ngModel)]="newUser.password" name="password" placeholder="Password" required minlength="6">
          </div>
          <button type="submit" class="btn-signup">SIGN UP</button>
        </form>
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </div>

    <div class="info-container">
      <div class="info-content">
        <h1>Hello, Friend!</h1>
        <p>Register with your personal details to use all of site features</p>
        <button (click)="toggleMode()" class="btn-toggle">
          {{ isSignUp ? 'SIGN IN' : 'SIGN UP' }}
        </button>
      </div>
    </div>
  </div>
</div>
